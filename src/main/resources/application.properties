spring.application.name=tienda

# Puerto donde se ejecuta el servidor web de la aplicación.
server.port=80

# Formato utilizado para mostrar la fecha y hora en los logs de la consola.
logging.pattern.dateformat=hh:mm

# Oculta el banner de Spring Boot al iniciar la aplicación.
spring.main.banner-mode=off

# Desactiva la caché de Thymeleaf durante el desarrollo para ver cambios en las vistas sin reiniciar.
# En producción sí se recomienda utilizar caché.
spring.thymeleaf.cache=false

# Conexión local a la base de datos Techshop en MySQL.
# Esta línea queda comentada porque actualmente se usa la base de datos remota.
# spring.datasource.url=jdbc:mysql://localhost:3306/techshop

# URL de conexión a la base de datos remota usada por el proyecto.
spring.datasource.url=db-tienda-web-patrones-tiendaproyectofidelitas.l.aivencloud.com

# Credenciales del usuario definido en el archivo creaTablas.sql.
spring.datasource.username=usuario_prueba
spring.datasource.password=Usuar1o_Clave.

# Driver JDBC de MySQL y dialecto usado por Hibernate para comunicarse con la base de datos.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Muestra y formatea las consultas SQL generadas por Hibernate en la consola.
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.type.descriptor.sql.BasicBinder=TRACE